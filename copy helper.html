<!DOCTYPE html>
<html>
<head><title>Copy Lotterywest Checker</title></head>
<body>
<h1>lotterywest_checker.py</h1>
<textarea id="f1" style="width:100%;height:300px;font-family:monospace;font-size:12px;"></textarea>
<h1>accounts_lotterywest.txt</h1>
<textarea id="f2" style="width:100%;height:100px;font-family:monospace;"></textarea>
<script>
fetch('lotterywest_checker.py').then(r=>r.text()).then(t=>document.getElementById('f1').value=t);
fetch('accounts_lotterywest.txt').then(r=>r.text()).then(t=>document.getElementById('f2').value=t);
</script>
</body>
</html>
