<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEADER SYSTEMS // COMMAND CENTER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        /* ============================================
           CUSTOM CSS VARIABLES & THEMES
           ============================================ */
        :root {
            --void-black: #030308;
            --deep-space: #0a0a15;
            --nebula-gray: #151525;
            --plasma-cyan: #00f0ff;
            --plasma-cyan-dim: #00a0aa;
            --plasma-pink: #ff00aa;
            --plasma-lime: #00ff66;
            --plasma-orange: #ff6600;
            --plasma-red: #ff0044;
            --plasma-purple: #9900ff;
            --star-white: #e8e8ff;
            --dim-star: #404060;
            
            --font-display: 'Orbitron', sans-serif;
            --font-body: 'Rajdhani', sans-serif;
            --font-mono: 'Share Tech Mono', monospace;
            
            --glow-cyan: 0 0 20px rgba(0,240,255,0.6), 0 0 40px rgba(0,240,255,0.3);
            --glow-pink: 0 0 20px rgba(255,0,170,0.6);
            --glow-lime: 0 0 15px rgba(0,255,102,0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--void-black);
            color: var(--star-white);
            font-family: var(--font-body);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ============================================
           BACKGROUND EFFECTS
           ============================================ */
        .stars-container {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: -1;
        }

        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(153,0,255,0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0,240,255,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(255,0,170,0.05) 0%, transparent 40%);
        }

        .scanlines {
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent 0px,
                transparent 1px,
                rgba(0,240,255,0.015) 1px,
                rgba(0,240,255,0.015) 2px
            );
            pointer-events: none;
            z-index: 999;
        }

        .grid-floor {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 200px;
            background: 
                linear-gradient(180deg, transparent 0%, rgba(0,240,255,0.02) 100%),
                repeating-linear-gradient(
                    90deg,
                    transparent 0px,
                    transparent 50px,
                    rgba(0,240,255,0.05) 50px,
                    rgba(0,240,255,0.05) 51px
                );
            transform: perspective(500px) rotateX(60deg);
            transform-origin: bottom;
            opacity: 0.3;
            z-index: -1;
        }

        /* ============================================
           HEADER
           ============================================ */
        .command-center {
            max-width: 1600px;
            margin: 0 auto;
            padding: 30px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: linear-gradient(90deg, var(--deep-space) 0%, var(--nebula-gray) 50%, var(--deep-space) 100%);
            border: 1px solid var(--plasma-cyan);
            border-radius: 4px;
            position: relative;
            margin-bottom: 30px;
        }

        header::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 20%;
            right: 20%;
            height: 2px;
            background: var(--plasma-cyan);
            box-shadow: var(--glow-cyan);
        }

        .logo-section h1 {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 8px;
            background: linear-gradient(90deg, var(--plasma-cyan), var(--plasma-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-section .tagline {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--dim-star);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .system-status {
            display: flex;
            gap: 20px;
            font-family: var(--font-mono);
            font-size: 0.7rem;
        }

        .status-module {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            background: var(--deep-space);
            border: 1px solid var(--dim-star);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--plasma-lime);
            box-shadow: var(--glow-lime);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.8); }
        }

        /* ============================================
           CUSTOM INPUT: FILE UPLOAD
           ============================================ */
        .control-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .control-module {
            background: var(--deep-space);
            border: 1px solid var(--dim-star);
            padding: 20px;
            position: relative;
        }

        .control-module::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 30px;
            height: 1px;
            background: var(--plasma-cyan);
        }

        .control-label {
            font-family: var(--font-display);
            font-size: 0.65rem;
            letter-spacing: 3px;
            color: var(--plasma-cyan);
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        /* Custom File Input - Sci-Fi Style */
        .file-drop-zone {
            position: relative;
            border: 2px dashed var(--dim-star);
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .file-drop-zone:hover {
            border-color: var(--plasma-cyan);
            background: rgba(0,240,255,0.03);
        }

        .file-drop-zone.dragover {
            border-color: var(--plasma-lime);
            background: rgba(0,255,102,0.05);
        }

        .file-drop-zone input {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .file-icon {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .file-text {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--dim-star);
        }

        .file-name {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--plasma-lime);
            margin-top: 8px;
        }

        /* ============================================
           CUSTOM SELECT - DROPDOWN
           ============================================ */
        .custom-select {
            position: relative;
        }

        .select-display {
            background: var(--void-black);
            border: 1px solid var(--dim-star);
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            transition: all 0.3s;
        }

        .select-display:hover {
            border-color: var(--plasma-cyan);
        }

        .select-display .arrow {
            transition: transform 0.3s;
        }

        .custom-select.open .select-display .arrow {
            transform: rotate(180deg);
        }

        .select-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--deep-space);
            border: 1px solid var(--plasma-cyan);
            border-top: none;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s;
            z-index: 100;
        }

        .custom-select.open .select-dropdown {
            max-height: 300px;
        }

        .select-option {
            padding: 10px 15px;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            transition: all 0.2s;
        }

        .select-option:hover {
            background: rgba(0,240,255,0.1);
            padding-left: 20px;
        }

        .select-option.selected {
            background: rgba(0,240,255,0.15);
            color: var(--plasma-cyan);
        }

        /* ============================================
           CUSTOM TOGGLE SWITCH
           ============================================ */
        .toggle-module {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .toggle-switch {
            width: 50px;
            height: 24px;
            background: var(--void-black);
            border: 1px solid var(--dim-star);
            position: relative;
            cursor: pointer;
            transition: all 0.3s;
        }

        .toggle-switch::before {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 18px;
            height: 18px;
            background: var(--dim-star);
            transition: all 0.3s;
        }

        .toggle-switch.active {
            border-color: var(--plasma-lime);
            background: rgba(0,255,102,0.1);
        }

        .toggle-switch.active::before {
            left: 28px;
            background: var(--plasma-lime);
            box-shadow: var(--glow-lime);
        }

        .toggle-label {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--dim-star);
        }

        /* ============================================
           CUSTOM BUTTONS
           ============================================ */
        .execute-btn {
            font-family: var(--font-display);
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 3px;
            padding: 15px 40px;
            background: transparent;
            color: var(--plasma-cyan);
            border: 2px solid var(--plasma-cyan);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .execute-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,240,255,0.3), transparent);
            transition: left 0.5s;
        }

        .execute-btn:hover {
            background: var(--plasma-cyan);
            color: var(--void-black);
            box-shadow: var(--glow-cyan);
        }

        .execute-btn:hover::before {
            left: 100%;
        }

        .execute-btn.running {
            animation: blinking 1s infinite;
        }

        @keyframes blinking {
            0%, 50%, 100% { opacity: 1; }
            25%, 75% { opacity: 0.5; }
        }

        /* Action Buttons */
        .action-btn {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            padding: 10px 18px;
            background: var(--deep-space);
            color: var(--star-white);
            border: 1px solid var(--dim-star);
            cursor: pointer;
            transition: all 0.3s;
        }

        .action-btn:hover {
            border-color: var(--plasma-cyan);
            color: var(--plasma-cyan);
        }

        .action-btn::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--plasma-cyan);
            transition: width 0.3s;
        }

        .action-btn:hover::before {
            width: 100%;
        }

        /* ============================================
           ACCOUNT CARDS
           ============================================ */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 25px;
        }

        .account-card {
            background: var(--deep-space);
            border: 1px solid var(--dim-star);
            position: relative;
            transition: all 0.4s;
        }

        .account-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 60px;
            height: 3px;
            background: var(--plasma-cyan);
        }

        .account-card::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 60px;
            height: 3px;
            background: var(--plasma-pink);
        }

        .account-card:hover {
            border-color: var(--plasma-cyan);
            transform: translateY(-3px);
            box-shadow: var(--glow-cyan);
        }

        /* Card Header */
        .card-header {
            padding: 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .account-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .account-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--plasma-red);
            box-shadow: 0 0 10px var(--plasma-red);
        }

        .account-indicator.valid {
            background: var(--plasma-lime);
            box-shadow: var(--glow-lime);
        }

        .account-email {
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .account-email .masked {
            color: var(--dim-star);
        }

        .payment-term {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            padding: 6px 12px;
            border: 1px solid var(--plasma-orange);
            color: var(--plasma-orange);
        }

        .expand-arrow {
            font-size: 1.2rem;
            transition: transform 0.4s;
            color: var(--plasma-cyan);
        }

        .account-card.expanded .expand-arrow {
            transform: rotate(180deg);
        }

        /* Card Content */
        .card-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.6s;
        }

        .account-card.expanded .card-content {
            max-height: 3000px;
        }

        .card-body {
            padding: 25px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-box {
            background: var(--void-black);
            border: 1px solid var(--dim-star);
            padding: 15px;
            text-align: center;
            position: relative;
        }

        .stat-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
        }

        .stat-box.open::before { background: var(--plasma-orange); }
        .stat-box.shipped::before { background: var(--plasma-lime); }
        .stat-box.backorder::before { background: var(--plasma-purple); }
        .stat-box.outstanding::before { background: var(--plasma-red); }

        .stat-value {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 700;
        }

        .stat-box.open .stat-value { color: var(--plasma-orange); }
        .stat-box.shipped .stat-value { color: var(--plasma-lime); }
        .stat-box.backorder .stat-value { color: var(--plasma-purple); }
        .stat-box.outstanding .stat-value { color: var(--plasma-red); }

        .stat-label {
            font-family: var(--font-mono);
            font-size: 0.6rem;
            color: var(--dim-star);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Sections */
        .section-title {
            font-family: var(--font-display);
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: var(--plasma-cyan);
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(0,240,255,0.2);
        }

        .section-title::before {
            content: '// ';
            color: var(--dim-star);
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            background: var(--void-black);
            border-left: 2px solid var(--dim-star);
        }

        .detail-label {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--dim-star);
        }

        .detail-value {
            font-family: var(--font-mono);
            font-size: 0.75rem;
        }

        /* Orders */
        .order-item {
            background: var(--void-black);
            border-left: 3px solid var(--plasma-orange);
            padding: 15px;
            margin-bottom: 10px;
        }

        .order-item.shipped { border-left-color: var(--plasma-lime); }
        .order-item.backorder { border-left-color: var(--plasma-purple); }

        .order-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .order-id {
            font-family: var(--font-display);
            color: var(--plasma-orange);
            font-weight: 700;
        }

        .order-item.shipped .order-id { color: var(--plasma-lime); }
        .order-item.backorder .order-id { color: var(--plasma-purple); }

        .order-status {
            font-family: var(--font-mono);
            font-size: 0.6rem;
            padding: 4px 10px;
            background: rgba(255,102,0,0.2);
            color: var(--plasma-orange);
        }

        .order-status.shipped { background: rgba(0,255,102,0.2); color: var(--plasma-lime); }
        .order-status.backorder { background: rgba(153,0,255,0.2); color: var(--plasma-purple); }

        .order-meta {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--dim-star);
            margin-bottom: 8px;
        }

        .order-meta strong {
            color: var(--plasma-cyan);
        }

        .order-products {
            font-size: 0.75rem;
            color: var(--dim-star);
            margin-bottom: 10px;
        }

        .order-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .download-link {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--plasma-pink);
            cursor: pointer;
            text-decoration: underline;
        }

        .download-link:hover {
            color: var(--plasma-cyan);
        }

        /* Contacts */
        .contact-card {
            background: var(--void-black);
            border-left: 3px solid var(--plasma-purple);
            padding: 12px;
            margin-bottom: 10px;
        }

        .contact-name {
            font-family: var(--font-display);
            font-size: 0.8rem;
            color: var(--plasma-purple);
            margin-bottom: 5px;
        }

        .contact-detail {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--dim-star);
        }

        /* Empty State */
        .empty-state {
            padding: 20px;
            text-align: center;
            color: var(--dim-star);
            font-style: italic;
            border: 1px dashed var(--dim-star);
        }

        /* Credit Cards */
        .credit-card {
            background: linear-gradient(135deg, var(--void-black), var(--nebula-gray));
            border: 1px solid var(--plasma-pink);
            padding: 10px 15px;
            font-family: var(--font-mono);
            color: var(--plasma-pink);
            display: inline-block;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        /* ============================================
           SLIDERS
           ============================================ */
        .slider-container {
            margin: 15px 0;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-family: var(--font-mono);
            font-size: 0.7rem;
        }

        .slider-value {
            color: var(--plasma-cyan);
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: var(--dim-star);
            border-radius: 2px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--plasma-cyan);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: var(--glow-cyan);
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 768px) {
            header { flex-direction: column; gap: 20px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .cards-grid { grid-template-columns: 1fr; }
            .control-panel { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="stars-container">
        <div class="stars"></div>
    </div>
    <div class="scanlines"></div>
    <div class="grid-floor"></div>

    <div class="command-center">
        <!-- HEADER -->
        <header>
            <div class="logo-section">
                <h1>LEADER SYSTEMS</h1>
                <div class="tagline">Account Intelligence Command Center</div>
            </div>
            <div class="system-status">
                <div class="status-module">
                    <div class="status-dot"></div>
                    <span>SYSTEM ONLINE</span>
                </div>
                <div class="status-module">
                    <span id="clock">00:00:00</span>
                </div>
            </div>
        </header>

        <!-- CONTROL PANEL -->
        <div class="control-panel">
            <!-- File Upload -->
            <div class="control-module">
                <div class="control-label">Accounts Source</div>
                <div class="file-drop-zone" id="fileDropZone">
                    <input type="file" id="accountsFile" accept=".txt">
                    <div class="file-icon">⬆</div>
                    <div class="file-text">DROP FILE OR CLICK TO UPLOAD</div>
                    <div class="file-name" id="fileName"></div>
                </div>
            </div>

            <!-- Date Range Slider -->
            <div class="control-module">
                <div class="control-label">Date Search Range</div>
                <div class="custom-select" id="dateSelect">
                    <div class="select-display">
                        <span class="select-value">THIS YEAR</span>
                        <span class="arrow">▼</span>
                    </div>
                    <div class="select-dropdown">
                        <div class="select-option" data-value="30">LAST 30 DAYS</div>
                        <div class="select-option" data-value="90">LAST 90 DAYS</div>
                        <div class="select-option" data-value="365" selected>THIS YEAR</div>
                        <div class="select-option" data-value="lastyear">LAST YEAR</div>
                        <div class="select-option" data-value="1825">LAST 5 YEARS</div>
                        <div class="select-option" data-value="all">ALL TIME</div>
                    </div>
                </div>
            </div>

            <!-- Proxy Toggle -->
            <div class="control-module">
                <div class="control-label">Proxy Configuration</div>
                <div class="toggle-module">
                    <div class="toggle-switch" id="proxyToggle"></div>
                    <span class="toggle-label">Enable Proxy Rotation</span>
                </div>
                <div class="slider-container" id="proxySettings" style="display:none; margin-top:15px;">
                    <div class="slider-label">
                        <span>Proxy Pool Size</span>
                        <span class="slider-value" id="proxyCount">10</span>
                    </div>
                    <input type="range" min="1" max="50" value="10" id="proxySlider">
                </div>
            </div>
        </div>

        <!-- ACTION BUTTONS -->
        <div style="display:flex; gap:15px; margin-bottom:30px; flex-wrap:wrap;">
            <button class="execute-btn" id="runBtn" onclick="runChecker()">▶ EXECUTE SCAN</button>
            <button class="action-btn" onclick="downloadAll('invoices')">⬇ DOWNLOAD INVOICES</button>
            <button class="action-btn" onclick="downloadAll('orders')">⬇ DOWNLOAD ORDERS</button>
            <button class="action-btn" onclick="exportData('json')">💾 JSON</button>
            <button class="action-btn" onclick="exportData('csv')">📊 CSV</button>
        </div>

        <!-- RESULTS GRID -->
        <div class="cards-grid" id="cardsGrid"></div>
    </div>

    <script>
        // ============== AUDIO ENGINE ==============
        class SoundEngine {
            constructor() { this.ctx = null; }
            init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
            
            play(type) {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                const now = this.ctx.currentTime;
                
                switch(type) {
                    case 'hover':
                        osc.frequency.setValueAtTime(800, now);
                        gain.gain.setValueAtTime(0.02, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                        osc.start(now); osc.stop(now + 0.05);
                        break;
                    case 'click':
                        osc.frequency.setValueAtTime(400, now);
                        osc.frequency.exponentialRampToValueAtTime(150, now + 0.1);
                        gain.gain.setValueAtTime(0.05, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                        osc.start(now); osc.stop(now + 0.1);
                        break;
                    case 'expand':
                        osc.type = 'square';
                        osc.frequency.setValueAtTime(200, now);
                        osc.frequency.exponentialRampToValueAtTime(600, now + 0.15);
                        gain.gain.setValueAtTime(0.03, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                        osc.start(now); osc.stop(now + 0.15);
                        break;
                    case 'success':
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(600, now);
                        osc.frequency.setValueAtTime(800, now + 0.1);
                        osc.frequency.setValueAtTime(1000, now + 0.2);
                        gain.gain.setValueAtTime(0.05, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                        osc.start(now); osc.stop(now + 0.4);
                        break;
                }
            }
        }
        const sfx = new SoundEngine();

        // ============== CLOCK ==============
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = 
                now.toTimeString().split(' ')[0];
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ============== CUSTOM CONTROLS ==============
        // File Drop Zone
        const fileDropZone = document.getElementById('fileDropZone');
        const accountsFile = document.getElementById('accountsFile');
        
        accountsFile.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                document.getElementById('fileName').textContent = e.target.files[0].name;
                sfx.play('click');
            }
        });

        fileDropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileDropZone.classList.add('dragover');
        });
        fileDropZone.addEventListener('dragleave', () => {
            fileDropZone.classList.remove('dragover');
        });
        fileDropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            fileDropZone.classList.remove('dragover');
            if (e.dataTransfer.files[0]) {
                accountsFile.files = e.dataTransfer.files;
                document.getElementById('fileName').textContent = e.dataTransfer.files[0].name;
            }
        });

        // Custom Select
        const dateSelect = document.getElementById('dateSelect');
        dateSelect.querySelector('.select-display').addEventListener('click', () => {
            sfx.init();
            dateSelect.classList.toggle('open');
        });

        dateSelect.querySelectorAll('.select-option').forEach(opt => {
            opt.addEventListener('click', () => {
                dateSelect.querySelectorAll('.select-option').forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
                dateSelect.querySelector('.select-value').textContent = opt.textContent;
                dateSelect.classList.remove('open');
                sfx.play('click');
            });
        });

        // Toggle Switch
        const proxyToggle = document.getElementById('proxyToggle');
        proxyToggle.addEventListener('click', () => {
            proxyToggle.classList.toggle('active');
            const settings = document.getElementById('proxySettings');
            settings.style.display = proxyToggle.classList.contains('active') ? 'block' : 'none';
            sfx.play('click');
        });

        // Proxy Slider
        document.getElementById('proxySlider').addEventListener('input', (e) => {
            document.getElementById('proxyCount').textContent = e.target.value;
        });

        // ============== SAMPLE DATA ==============
        const sampleData = [
            {
                email: "neopc00", password: "William_87192", status: "VALID",
                payment_terms: "COD", name: "NEO PC",
                contacts: [{ name: "Peter Papaioannou", role: "Account Manager", phone: "08 8112 6005" }],
                open_orders: [
                    { id: "ORD-2025-45123", date: "2025-05-08", status: "Pending", products: ["Cisco CBS350-48 Switch x1", "Cat6 Cable 305m x2"], total: "$1,856.00", invoice: "INV-2025-45123" },
                    { id: "ORD-2025-45089", date: "2025-05-05", status: "Pending", products: ["Ubiquiti UAP-AC-PRO x5"], total: "$1,245.00", invoice: "INV-2025-45089" }
                ],
                shipped_orders: [
                    { id: "ORD-2025-44956", date: "2025-04-28", status: "Shipped", products: ["Ubiquiti EdgeMAX x1"], total: "$890.00", invoice: "INV-2025-44956", tracking: "AUS-123456", courier: "Australia Post" }
                ],
                back_orders: [
                    { id: "ORD-2025-44778", date: "2025-04-15", status: "Back Order", products: ["Samsung S95B 65inch x1"], total: "$2,499.00" }
                ],
                outstanding: [
                    { id: "INV-2025-44956", date: "2025-04-28", amount: "$890.00", status: "Current" },
                    { id: "INV-2025-44521", date: "2025-04-10", amount: "$1,250.00", status: "30 Days" }
                ],
                credit_cards: []
            },
            {
                email: "astr20", password: "sAINTS@1965", status: "VALID",
                payment_terms: "COD", name: "NEVENA VOJINOVIC",
                contacts: [{ name: "Peter Papaioannou", role: "Account Manager", phone: "08 8112 6005" }],
                open_orders: [], shipped_orders: [], back_orders: [], outstanding: [],
                credit_cards: ["Visa **** 4242 (12/26)", "Mastercard **** 8888 (08/27)"]
            }
        ];

        let currentData = sampleData;

        // ============== RENDER ==============
        function renderCards(accounts) {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';
            
            accounts.forEach((acc, idx) => {
                const card = document.createElement('div');
                card.className = 'account-card';
                card.innerHTML = renderCard(acc, idx);
                grid.appendChild(card);
                
                card.querySelector('.card-header').addEventListener('click', () => {
                    sfx.init();
                    const is = card.classList.contains('expanded');
                    document.querySelectorAll('.account-card.expanded').forEach(c => c.classList.remove('expanded'));
                    if (!is) {
                        card.classList.add('expanded');
                        sfx.play('expand');
                    }
                });
            });
            
            sfx.play('success');
        }

        function renderCard(acc) {
            const o = acc.open_orders || [], s = acc.shipped_orders || [], b = acc.back_orders || [], u = acc.outstanding || [];
            
            return `
                <div class="card-header">
                    <div class="account-info">
                        <div class="account-indicator ${acc.status === 'VALID' ? 'valid' : ''}"></div>
                        <div class="account-email">${acc.email}<span class="masked">:${acc.password.slice(-4)}</span></div>
                    </div>
                    <div style="display:flex;align-items:center;gap:15px;">
                        <span class="payment-term">${acc.payment_terms}</span>
                        <span class="expand-arrow">▼</span>
                    </div>
                </div>
                <div class="card-content">
                    <div class="card-body">
                        <div class="stats-grid">
                            <div class="stat-box open"><div class="stat-value">${o.length}</div><div class="stat-label">Open</div></div>
                            <div class="stat-box shipped"><div class="stat-value">${s.length}</div><div class="stat-label">Shipped</div></div>
                            <div class="stat-box backorder"><div class="stat-value">${b.length}</div><div class="stat-label">Back Order</div></div>
                            <div class="stat-box outstanding"><div class="stat-value">${u.length}</div><div class="stat-label">Outstanding</div></div>
                        </div>

                        <div class="section-title">Account Details</div>
                        <div class="detail-grid">
                            <div class="detail-item"><span class="detail-label">Name</span><span class="detail-value">${acc.name}</span></div>
                            <div class="detail-item"><span class="detail-label">Terms</span><span class="detail-value">${acc.payment_terms}</span></div>
                        </div>

                        ${acc.contacts && acc.contacts.length ? `
                        <div class="section-title">Contacts</div>
                        <div style="margin-bottom:20px;">
                            ${acc.contacts.map(c => `
                                <div class="contact-card">
                                    <div class="contact-name">#${acc.contacts.indexOf(c)+1} ${c.name}</div>
                                    <div class="contact-detail">${c.role} | ${c.phone}</div>
                                </div>
                            `).join('')}
                        </div>
                        ` : ''}

                        <div class="section-title">Open Orders (${o.length})</div>
                        ${o.length ? o.map(ord => `
                            <div class="order-item">
                                <div class="order-header">
                                    <span class="order-id">${ord.id}</span>
                                    <span class="order-status">${ord.status}</span>
                                </div>
                                <div class="order-meta">Date: <strong>${ord.date}</strong></div>
                                <div class="order-products">${ord.products.join(', ')}</div>
                                <div class="order-actions">
                                    <span class="download-link" onclick="sfx.play('click')">⬇ ${ord.invoice}</span>
                                </div>
                            </div>
                        `).join('') : '<div class="empty-state">No open orders</div>'}

                        <div class="section-title">Shipped Orders (${s.length})</div>
                        ${s.length ? s.map(ord => `
                            <div class="order-item shipped">
                                <div class="order-header">
                                    <span class="order-id">${ord.id}</span>
                                    <span class="order-status shipped">${ord.status}</span>
                                </div>
                                <div class="order-meta">
                                    Shipped: <strong>${ord.date}</strong><br>
                                    Tracking: <strong>${ord.tracking}</strong> | Courier: <strong>${ord.courier}</strong>
                                </div>
                                <div class="order-products">${ord.products.join(', ')}</div>
                                <div class="order-actions">
                                    <span class="download-link">⬇ ${ord.invoice}</span>
                                </div>
                            </div>
                        `).join('') : '<div class="empty-state">No shipped orders</div>'}

                        <div class="section-title">Back Orders (${b.length})</div>
                        ${b.length ? b.map(ord => `
                            <div class="order-item backorder">
                                <div class="order-header">
                                    <span class="order-id">${ord.id}</span>
                                    <span class="order-status backorder">${ord.status}</span>
                                </div>
                                <div class="order-meta">Date: <strong>${ord.date}</strong></div>
                                <div class="order-products">${ord.products.join(', ')}</div>
                            </div>
                        `).join('') : '<div class="empty-state">No back orders</div>'}

                        <div class="section-title">Outstanding (${u.length})</div>
                        ${u.length ? u.map(inv => `
                            <div class="order-item" style="border-left-color:var(--plasma-red)">
                                <div class="order-header">
                                    <span class="order-id">${inv.id}</span>
                                    <span class="order-status">${inv.status}</span>
                                </div>
                                <div class="order-meta">Due: <strong>${inv.date}</strong> | Amount: <strong>${inv.amount}</strong></div>
                            </div>
                        `).join('') : '<div class="empty-state">All invoices paid</div>'}

                        <div class="section-title">Credit Cards</div>
                        ${acc.credit_cards && acc.credit_cards.length ? 
                            acc.credit_cards.map(c => `<span class="credit-card">💳 ${c}</span>`).join('') :
                            '<div class="empty-state">No cards on file</div>'}
                    </div>
                </div>
            `;
        }

        // ============== ACTIONS ==============
        function runChecker() {
            sfx.init();
            const btn = document.getElementById('runBtn');
            btn.classList.add('running');
            btn.textContent = '⏳ SCANNING...';
            sfx.play('click');
            
            setTimeout(() => {
                btn.classList.remove('running');
                btn.textContent = '▶ EXECUTE SCAN';
                renderCards(currentData);
            }, 1500);
        }

        function downloadAll(type) {
            sfx.init();
            sfx.play('click');
            alert(`Downloading all ${type}...`);
        }

        function exportData(format) {
            sfx.init();
            sfx.play('click');
            alert(`Exporting ${format.toUpperCase()}...`);
        }

        // Initial render
        renderCards(sampleData);

        // Hover effects
        document.querySelectorAll('.account-card, .action-btn, .execute-btn').forEach(el => {
            el.addEventListener('mouseenter', () => sfx.play('hover'));
        });
    </script>
</body>
</html>
