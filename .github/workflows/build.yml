name: Build EXE

on:
  push:
    branches: [main]
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install pyinstaller selenium webdriver-manager
        
      - name: Build EXE
        run: pyinstaller --onefile --name lotterywest_checker lotterywest_checker.py --console
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lotterywest_checker.exe
          path: dist/lotterywest_checker
          
      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: dist/lotterywest_checker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}